name: Web Build Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run web build check
        shell: bash
        run: |
          if [ -f package.json ]; then
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
            npm run build
          else
            if [ ! -f index.html ]; then
              echo "index.html not found"
              exit 1
            fi
            echo "Static project detected, skipping npm build"
          fi
